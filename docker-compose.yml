services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    mem_limit: 300m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CORPUS_DIR=/app/corpus
      - EXPORTS_DIR=/app/exports
      - CACHE_DIR=/app/cache
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/corpus:/app/corpus:ro
      - backend-exports:/app/exports
      - backend-cache:/app/cache
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 2g
    cpus: 1.5

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - CORPUS_DIR=/app/corpus
      - EXPORTS_DIR=/app/exports
      - CACHE_DIR=/app/cache
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/corpus:/app/corpus:ro
      - backend-exports:/app/exports
      - backend-cache:/app/cache
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 2g
    cpus: 1.5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

volumes:
  backend-exports:
  backend-cache:
  redis-data:

networks:
  internal:
    driver: bridge
