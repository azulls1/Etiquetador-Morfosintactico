services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CORPUS_DIR=/app/corpus
      - EXPORTS_DIR=/app/exports
      - CACHE_DIR=/app/cache
    volumes:
      - ./backend/corpus:/app/corpus:ro
      - backend-exports:/app/exports
      - backend-cache:/app/cache
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 2g
    cpus: 1.5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

volumes:
  backend-exports:
  backend-cache:

networks:
  internal:
    driver: bridge
